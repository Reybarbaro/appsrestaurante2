<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mesa del Chef — Menú</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ── Header ───────────────────────────────────────────────── -->
    <header>
        <div class="header-brand">
            <h1>La Mesa del Chef</h1>
            <p>Sistema de menú · Firebase Realtime DB</p>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <span class="db-status" id="db-status">
                <span class="db-dot" id="db-dot"></span>
                <span id="db-label">Sin conexión</span>
            </span>
            <div class="header-tabs">
                <button class="tab-btn active" onclick="switchTab('menu')">📋 Menú</button>
                <button class="tab-btn" onclick="switchTab('admin')">⚙️ Mantenimiento</button>
            </div>
        </div>
    </header>

    35 <!-- ── Main ─────────────────────────────────────────────────── -->
    36 <main>
        37
        38 <!-- === SECCIÓN: MENÚ === -->
        39 <div id="section-menu" class="section active">
            40 <div class="filter-bar" id="filter-bar">
                41 <button class="pill active" data-cat="all" onclick="setFilter('all', this)">Todos</button>
                42 </div>
            43 <div id="menu-content">
                44 <div class="loading">Cargando menú...</div>
                45 </div>
            46 </div>

        <!-- === SECCIÓN: MANTENIMIENTO === -->
        <div id="section-admin" class="section">

            <!-- Estadísticas -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat-card">
                    <div class="stat-val" id="stat-total">0</div>
                    <div class="stat-lbl">Platillos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-cats">0</div>
                    <div class="stat-lbl">Categorías</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-avg">₡0</div>
                    <div class="stat-lbl">Precio promedio</div>
                </div>
            </div>

            <!-- Formulario -->
            <div class="form-card">
                <h2 id="form-title">Agregar nuevo platillo</h2>
                <input type="hidden" id="edit-id">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre del platillo *</label>
                        <input type="text" id="f-name" placeholder="Ej: Pollo al ajillo">
                    </div>
                    <div class="form-group">
                        <label>Precio (₡) *</label>
                        <input type="number" id="f-price" placeholder="Ej: 4500" min="0">
                    </div>
                    <div class="form-group">
                        <label>Categoría *</label>
                        <select id="f-cat"></select>
                    </div>
                    <div class="form-group">
                        <label>Emoji / ícono</label>
                        <input type="text" id="f-icon" placeholder="🍽️" maxlength="4">
                    </div>
                </div>
                <div class="form-grid full" style="margin-top:14px;">
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="f-desc" placeholder="Ingredientes o descripción del platillo..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="saveDish()">
                        <span id="btn-save-text">Agregar platillo</span>
                    </button>
                    <button class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
                    <button class="btn btn-secondary" id="btn-cancel-edit" onclick="cancelEdit()"
                        style="display:none; color:#C0392B; border-color:#E0B0AD;">
                        Cancelar edición
                    </button>
                </div>
            </div>

            <!-- Lista de platillos -->
            <div class="admin-section-title">
                Platillos registrados
                <span id="admin-count"
                    style="font-size:0.8rem; color:var(--muted); font-weight:400; font-family:var(--font-body);"></span>
                <button class="btn btn-secondary" style="margin-left:auto; font-size:0.78rem; padding:5px 14px;"
                    onclick="cargarEjemplos()">
                    ⬇️ Cargar platillos de ejemplo
                </button>
            </div>
            <div id="admin-list">
                <div class="loading">Cargando...</div>
            </div>

        </div>
